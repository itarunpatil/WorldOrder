name: Build Windows

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build-windows:
    name: Build signed Windows artifact
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/WorldOrder.Desktop/WorldOrder.Desktop.csproj

      - name: Publish Windows app
        run: dotnet publish src/WorldOrder.Desktop/WorldOrder.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:DebugType=embedded -o artifacts/windows

      - name: Sign Windows executable with repository development certificate
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Where-Object { $_.FullName -match '\\x64\\signtool.exe$' } | Sort-Object FullName | Select-Object -Last 1
          if (-not $signtool) { throw "signtool.exe was not found on the runner" }
          & $signtool.FullName sign /f windows/worldorder-dev-codesign.pfx /p worldorder /fd SHA256 artifacts/windows/WorldOrder.exe

      - name: Rename and package by commit hash
        shell: pwsh
        run: |
          $short = "${{ github.sha }}".Substring(0, 7)
          $out = "artifacts/WorldOrder-$short-windows-x64"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item artifacts/windows/* $out -Recurse -Force
          Compress-Archive -Path "$out/*" -DestinationPath "artifacts/WorldOrder-$short-windows-x64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldOrder-${{ github.sha }}-windows-x64
          path: artifacts/WorldOrder-*-windows-x64.zip
          if-no-files-found: error
