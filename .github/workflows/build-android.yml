name: Build Android

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build-android:
    name: Build signed Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore
        run: dotnet restore src/WorldOrder.Android/WorldOrder.Android.csproj

      - name: Publish signed Android APK
        run: |
          dotnet publish src/WorldOrder.Android/WorldOrder.Android.csproj \
            -c Release \
            -f net8.0-android \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=$GITHUB_WORKSPACE/android/worldorder-dev.keystore \
            -p:AndroidSigningStorePass=worldorder \
            -p:AndroidSigningKeyAlias=worldorder \
            -p:AndroidSigningKeyPass=worldorder \
            -o artifacts/android

      - name: Rename APK by commit hash
        run: |
          set -euo pipefail
          short="${GITHUB_SHA::7}"
          apk="$(find artifacts/android -type f -name '*.apk' | head -n 1)"
          test -n "$apk"
          mkdir -p artifacts/final
          cp "$apk" "artifacts/final/WorldOrder-${short}-android.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldOrder-${{ github.sha }}-android
          path: artifacts/final/WorldOrder-*-android.apk
          if-no-files-found: error
